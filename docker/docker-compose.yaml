version: "3.9"

name: tech-challenge-fase02

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tech_challenge_fase02
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tech-challenge-fase02:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-challenge-fase02
    container_name: tech-challenge-fase02
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tech_challenge_fase02
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: ${JWT_SECRET:-dGVjaC1jaGFsbGVuZ2UtZmFzZTAyLWp3dC1zZWNyZXQta2V5LWZpYXAtMjAyNS10ZWNoY2hhbGxlbmdl}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

volumes:
  pg_data:
